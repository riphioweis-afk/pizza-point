<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍕 Pizza Point POS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f0f0; color: #222; }

    nav {
      background: #3f3837;
      color: rgb(201, 57, 57);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav h1 { font-size: 20px; font-weight: 700; }
    nav a {
      color: white;
      text-decoration: none;
      background: rgba(225, 6, 6, 0.552);
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 14px;
      margin-left: 8px;
    }
    nav a:hover { background: rgba(255,255,255,0.35); }

    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      padding: 8px 16px;
    }
    .btn-red    { background: #a93226; color: white; }
    .btn-green  { background: #27ae60; color: white; }
    .btn-dark   { background: #333; color: white; }
    .btn-gray   { background: #ddd; color: #0e0d0d; }
    .btn-red:hover   { background: #3f3837; }
    .btn-green:hover { background: #219150; }
    .btn-dark:hover  { background: #555; }
  </style>
</head>
<body>
  <nav>
    <h3><a href="{% url 'secret' %}" style="text-decoration:none;">🍕</a> Pizza Point POS</h3>    <div>
      <a href="{% url 'order' %}"> New Order</a>
      <a href="{% url 'kitchen' %}">Kitchen</a>
     </div>
    <div class="nav-right">
      {% if user.is_authenticated %}
        <span class="staff-badge">👤 {{ user.get_full_name|default:user.username }}</span>
        <form class="clock-out-form" method="POST" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit">Clock Out</button>
        </form>
      {% endif %}
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
